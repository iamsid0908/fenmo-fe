services:
  fenmo-fe:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/v1}
    image: fenmo-fe:latest
    container_name: fenmo-fe
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
